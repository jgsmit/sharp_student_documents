{% load static %}
<!-- Message Display Component -->
{% if messages %}
<div class="messages-container fixed-top" style="z-index: 1050; margin-top: 70px;">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show m-0 shadow-sm" role="alert">
      <div class="container">
        <div class="d-flex align-items-center">
          {% if message.tags == 'success' %}
            <i class="bi bi-check-circle-fill me-2"></i>
          {% elif message.tags == 'error' %}
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
          {% elif message.tags == 'warning' %}
            <i class="bi bi-exclamation-triangle me-2"></i>
          {% elif message.tags == 'info' %}
            <i class="bi bi-info-circle-fill me-2"></i>
          {% endif %}
          <span>{{ message }}</span>
          <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      </div>
    </div>
  {% endfor %}
</div>

<script>
// Auto-hide messages after 5 seconds
document.addEventListener('DOMContentLoaded', function() {
  const alerts = document.querySelectorAll('.alert');
  alerts.forEach(function(alert) {
    setTimeout(function() {
      const bsAlert = new bootstrap.Alert(alert);
      bsAlert.close();
    }, 5000);
  });
});
</script>

<style>
.messages-container .alert {
  border-left: 4px solid;
  animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
  from {
    transform: translateY(-100%);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.alert-success {
  border-left-color: #198754;
  background: linear-gradient(90deg, #d1e7dd 0%, #f8f9fa 100%);
}

.alert-error {
  border-left-color: #dc3545;
  background: linear-gradient(90deg, #f8d7da 0%, #f8f9fa 100%);
}

.alert-warning {
  border-left-color: #ffc107;
  background: linear-gradient(90deg, #fff3cd 0%, #f8f9fa 100%);
}

.alert-info {
  border-left-color: #0dcaf0;
  background: linear-gradient(90deg, #cff4fc 0%, #f8f9fa 100%);
}
</style>
{% endif %}
