services:
  - type: web
    name: sharp-student-docs
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn sharp_student_documents.wsgi:application"
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: sharpdocs-db
          property: connectionString

databases:
  - name: sharpdocs-db
    plan: free
