{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Page Not Found | SharpDocs</title>
  <link rel="icon" href="{% static 'sharp.png' %}" type="image/png">
  <style>
    :root {
      color-scheme: light;
      --page-bg: linear-gradient(160deg, #f6f8fc 0%, #eef3ff 100%);
      --card-bg: #ffffff;
      --text-main: #10233f;
      --text-muted: #5f7087;
      --accent: #1a4fa3;
      --accent-strong: #143d7d;
      --border: rgba(26, 79, 163, 0.12);
      --shadow: 0 24px 60px rgba(16, 35, 63, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: var(--page-bg);
      color: var(--text-main);
    }

    .card {
      width: min(100%, 720px);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 40px 32px;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin-bottom: 20px;
    }

    .code {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 16px auto 0;
      max-width: 34rem;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .button {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .button-primary {
      background: var(--accent);
      color: #ffffff;
    }

    .button-secondary {
      background: #eef3fb;
      color: var(--accent-strong);
    }

    .button:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="{% static 'sharp.png' %}" alt="SharpDocs logo">
    <p class="code">404 Error</p>
    <h1>Page Not Found</h1>
    <p>The page you are looking for does not exist or may have been moved.</p>
    <div class="actions">
      <a class="button button-primary" href="/">Back to Home</a>
      <a class="button button-secondary" href="/documents/all/">Browse Documents</a>
    </div>
  </main>
</body>
</html>
