{% extends "base.html" %}
{% block title %}{{ article.title }} - SharpDocs{% endblock %}
{% block meta_description %}{{ article.content|striptags|truncatewords:25 }}{% endblock %}

{% block content %}
<section class="container py-5">
    <h1 class="mb-4">{{ article.title }}</h1>
    <div class="card shadow-sm p-4">
        {{ article.content|linebreaks }}
    </div>
</section>
{% endblock %}
