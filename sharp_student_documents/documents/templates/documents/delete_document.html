{% extends "base.html" %}
{% block title %}Delete Document - {{ document.title }}{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-danger">
        <div class="card-body text-center">
          <h3 class="text-danger mb-3">⚠️ Confirm Deletion</h3>
          <p class="mb-4">
            Are you sure you want to permanently delete <strong>"{{ document.title }}"</strong>?  
            <br>This action <span class="text-danger fw-bold">cannot be undone</span>.
          </p>

          <form method="post" class="d-flex justify-content-center gap-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">🗑 Yes, Delete</button>
            <a href="{% url 'seller_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
